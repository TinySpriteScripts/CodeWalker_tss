name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore CodeWalker.sln

      - name: Build Release
        run: msbuild CodeWalker.sln /t:Build /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Package binaries
        shell: pwsh
        run: |
          $out = "release-package"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item "CodeWalker\bin\Release\net48\*" -Destination $out -Recurse -Force
          
          # Include ImageDB if you want it shipped with release:
          if (Test-Path "ImageDB") {
            Copy-Item "ImageDB" -Destination $out -Recurse -Force
          }

          Compress-Archive -Path "$out\*" -DestinationPath "codewalker_tss-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codewalker_tss-windows
          path: codewalker_tss-windows.zip

      - name: Create GitHub Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: codewalker_tss-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
